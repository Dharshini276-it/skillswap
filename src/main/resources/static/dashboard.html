<!DOCTYPE html>
<html>

<head>

<title>SkillSwap Dashboard</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f7fa;
}

header{
background:#007bff;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:30px;
text-align:center;
}

button{
padding:10px 20px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>

<h1>SkillSwap Dashboard</h1>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<h2>Your Skill Matches</h2>

<h2>Connection Requests</h2>
<div id="requests"></div>

<div id="matches"></div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("loggedUser"));

if(!user){
window.location.href="login.html";
}

let mySkill = user.skill;
let wantSkill = user.wantToLearn;


fetch("http://localhost:8080/users/swap?skill="+mySkill+"&want="+wantSkill)

.then(res => res.json())

.then(data => {

let container = document.getElementById("matches");

if(data.length === 0){

container.innerHTML = "<p>No matches found yet</p>";

}else{

showMatches(data);

}

});



function showMatches(users){

let container = document.getElementById("matches");

container.innerHTML = "";

users.forEach(u => {

container.innerHTML += `
<div class="card">

<h3>${u.name}</h3>

<p><b>Skill:</b> ${u.skill}</p>

<p><b>Wants to learn:</b> ${u.wantToLearn}</p>

<button onclick="connectUser('${u.email}','${u.name}')">
Connect
</button>

</div>
`;

});

}



function connectUser(email,name){

let user = JSON.parse(localStorage.getItem("loggedUser"));

fetch("http://localhost:8080/users/connect",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

toEmail:email,
fromName:user.name,
fromEmail:user.email

})

})

.then(res=>res.text())
.then(data=>{
alert("Connection request sent to "+name);
});

}
// later chat page open pannalam
// window.location.href = "chat.html";





function logout(){

localStorage.removeItem("loggedUser");

window.location.href="login.html";

}

fetch("http://localhost:8080/users/requests?email="+user.email)

.then(res=>res.json())

.then(data=>{

let container = document.getElementById("requests");

data.forEach(r=>{

container.innerHTML += `
<div class="card">
<p><b>${r.senderEmail}</b> wants to connect</p>
<p>Status : ${r.status}</p>
</div>
`;

});

});

</script>

</body>

</html>
